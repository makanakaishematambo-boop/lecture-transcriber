<!DOCTYPE html>
<html>
<head>
    <title>Lecture Transcriber</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px;
            background-color: #f4f4f4;
        }
        h1 {
            color: #333;
        }
        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: black;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>Lecture Transcriber 🎓</h1>
        <p>Upload your lecture audio and convert it to text.</p>
        <input type="file" id="audioFile" accept="audio/*">
        <br><br>
        <button onclick="document.getElementById('audioFile').click()">
  Transcribe
</button>
    </div>

    <script>
  const button = document.querySelector("button");
  const fileInput = document.querySelector("input[type='file']");

  // Create result area
  const resultBox = document.createElement("div");
  resultBox.style.marginTop = "20px";
  resultBox.style.whiteSpace = "pre-wrap";
  document.querySelector(".box").appendChild(resultBox);

  button.addEventListener("click", async () => {
    const file = fileInput.files[0];

    if (!file) {
      alert("Please select an audio file first.");
      return;
    }

    resultBox.innerText = "Transcribing... Please wait.";

    const response = await fetch("/api/transcribe", {
      method: "POST",
      headers: {
        "Content-Type": "application/octet-stream",
      },
      body: file,
    });

    const data = await response.json();

    if (data.text) {
      resultBox.innerText = data.text;
    } else {
      resultBox.innerText = "Error: Transcription failed.";
    }
  });
</script>
</body>
</html>
